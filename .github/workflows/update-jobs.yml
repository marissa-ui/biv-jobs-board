# Refreshes jobs nightly and republishes the board via GitHub Pages.
name: Update jobs
on:
  schedule:
    - cron: "0 6 * * *"   # daily, 6:00 UTC
  workflow_dispatch:        # manual "Run workflow" button
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests playwright && playwright install chromium --with-deps
      - run: python fetch_jobs.py --render
      - name: Commit updated jobs.json
        run: |
          git config user.name "jobs-bot"
          git config user.email "actions@github.com"
          git add jobs.json
          git diff --cached --quiet || git commit -m "Update jobs $(date -u +%F)"
          git push
